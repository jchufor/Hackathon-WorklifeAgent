    function useTweaks(defaults) { const [v, setV] = React.useState(defaults); const set = React.useCallback((k, val) => { const e = typeof k === 'object' ? k : { [k]: val }; setV(p => ({ ...p, ...e })); }, []); return [v, set]; }

    /* AgentAvatar */
    function AgentAvatar({ agent, style = "icon", size = 32 }) {
      if (!agent) return null; const s = size;
      if (style === "dot") return <span style={{ display: "inline-block", width: s * .42, height: s * .42, borderRadius: "50%", background: agent.color, boxShadow: `0 0 0 ${s * .12}px ${agent.color}22`, flexShrink: 0 }} />;
      if (style === "illustration") return <span style={{ display: "inline-grid", placeItems: "center", width: s, height: s, flexShrink: 0, borderRadius: "50%", background: `radial-gradient(circle at 30% 25%,${agent.color}33,${agent.color}11 60%,transparent)`, border: `1.5px solid ${agent.color}66`, position: "relative" }}><span style={{ position: "absolute", inset: 3, borderRadius: "50%", background: `linear-gradient(140deg,#fff,${agent.color}18)`, border: `1px solid ${agent.color}33` }} /><span style={{ position: "relative", fontSize: s * .5 }}>{agent.glyph}</span></span>;
      return <span style={{ display: "inline-grid", placeItems: "center", width: s, height: s, flexShrink: 0, borderRadius: s * .32, background: `${agent.color}14`, color: agent.color, fontSize: s * .5, border: `1px solid ${agent.color}28` }}>{agent.glyph}</span>;
    }

 "Orchestrator log"}</div><div className="trace-log"><div><span className="log-t">00ms</span> intent.classify("{lastTrace.query.slice(0, 40)}{lastTrace.query.length > 40 ? "…" : ""}")</div><div><span className="log-t">12ms</span> route.score → {lastTrace.candidates.length} candidates</div><div><span className="log-t">38ms</span> dispatch → <b>{lastTrace.finalAgent}</b></div><div><span className="log-t">{Math.round(lastTrace.elapsed * .55)}ms</span> {lastTrace.finalAgent}.execute()</div><div><span className="log-t">{Math.round(lastTrace.elapsed * .85)}ms</span> wiki.cite ← {Math.floor(Math.random() * 3) + 1} pages</div><div><span className="log-t">{lastTrace.elapsed}ms</span> response.compose ✓</div></div></div></div> : <div className="inspector-empty">{lang === "ko" ? "어시스턴트에 메시지를 보내면 라우팅 흐름이 여기 표시됩니다." : "Send a message and the routing trace appears here."}</div>}<div className="inspector-roster"><div className="trace-label">{lang === "ko" ? "전문 에이전트 12종" : "12 specialist agents"}</div><div className="roster-grid">{window.AGENTS.filter(a => a.role === "specialist").map(a => <div key={a.id} className="roster-item"><AgentAvatar agent={a} style={avatarStyle} size={26} /><span>{window.agentName(a)}</span></div>)}</div></div></aside>;

    /* App */
    function App() {
      const [lang, setLang] = useS(window.WL_LANG);
      const [tweaks, setTweak] = useTweaks({ avatarStyle: "icon", persona: "vet" });
      const [tab, setTab] = useS("chat");
      const [messages, setMessages] = useS([]);
      const [input, setInput] = useS("");
      const [sending, setSending] = useS(false);
      const [routing, setRouting] = useS(null);
      const [inspectorOpen, setInspectorOpen] = useS(false);
      const [lastTrace, setLastTrace] = useS(null);
      const [demoOpen, setDemoOpen] = useS(true);
      const [simRunning, setSimRunning] = useS(false);
      const [simId, setSimId] = useS(null);
      const [simStep, setSimStep] = useS(0);
      const scrollRef = useR(null);
      const simTimeoutsRef = useR([]);

      useE(() => { const h = e => setLang(e.detail); window.addEventListener("wl-lang-change", h); return () => window.removeEventListener("wl-lang-change", h); }, []);
      useE(() => { setMessages([{ id: "g0", role: "bot", html: window.t("chat_greeting") }]); }, [lang]);
      useE(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages, routing]);

      const personaPrompts = {
        new: lang === "ko" ? ["사원증을 어제 분실했어요. 재발급 받고 싶어요", "강남역에서 본사 가는 셔틀 다음 시간 알려줘", "회사 식당 운영시간 알려줘"] : ["I lost my ID card yesterday. Need to reissue.", "Next shuttle from Gangnam Station to HQ?", "What are the cafeteria hours?"],
        vet: lang === "ko" ? ["내일 오후 4시에 6명 회의실 예약해줘", "내 복지포인트 잔액 알려줘", "SVPN 신청하고 싶어"] : ["Book a 6-person meeting room tomorrow at 4pm", "What's my welfare points balance?", "I need to apply for SVPN"],
        mgr: lang === "ko" ? ["팀원 외부교육 승인 절차 알려줘", "다음 주 전체 회의실 30명 예약 가능한 곳", "복지포인트 일괄 사용 가이드"] : ["External training approval process for my team", "Find a 30-person room next week", "Bulk welfare-point usage guide"],
      };

      const send = (textArg) => {
        const text = (textArg ?? input).trim(); if (!text || sending) return;
        setInput(""); setMessages(m => [...m, { id: "u" + Date.now(), role: "user", text }]); setSending(true);
        const matched = window.matchScenario(text), finalAgent = matched ? matched.agent : "general";
        const allSpec = window.AGENTS.filter(a => a.role === "specialist").map(a => a.id);
        let cands = matched?.related ? [...matched.related] : ["wiki", "general"];
        if (!cands.includes(finalAgent)) cands.unshift(finalAgent);
        if (cands.length < 3) { const ex = allSpec.find(id => !cands.includes(id)); if (ex) cands.push(ex); }
        cands = cands.slice(0, 3).filter(c => c !== finalAgent).concat([finalAgent]);
        setRouting({ candidates: cands, finalAgent });
        const elapsed = 480 + Math.floor(Math.random() * 220);
        setTimeout(() => {
          setRouting(null);
          const trace = { query: text, candidates: cands, finalAgent, confidence: matched ? matched.confidence : 0.55, elapsed, minutesSaved: matched ? matched.minutesSaved : 3, tools: matched ? matched.tools : ["wiki.search"] };
          setLastTrace(trace);
          const raw = matched ? (window.WL_LANG === "ko" ? matched.answerKo : matched.answerEn) : (window.WL_LANG === "ko" ? "조금 더 자세히 알려주세요. 셔틀, 회의실, 복지, 사원증, IT 도움이 필요하신가요?" : "Could you say a bit more? Need help with shuttle, meeting rooms, benefits, ID card, or IT?");
          const html = raw.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>").replace(/\n/g, "<br>");
          setMessages(m => [...m, { id: "b" + Date.now(), role: "bot", html, agentId: finalAgent, routedTo: finalAgent, elapsed, scenario: matched, actionCard: (matched && matched.steps && matched.steps.length) ? { title: matched.actionTitleKo, steps: matched.steps } : null }]);
          setSending(false);
        }, elapsed);
      };

      const stopSimulation = () => {
        simTimeoutsRef.current.forEach(clearTimeout);
        simTimeoutsRef.current = [];
        setSimRunning(false); setSimId(null); setSimStep(0);
        setRouting(null); setSending(false);
        setMessages(m => m.map(msg => msg.followUps ? { ...msg, followUps: null } : msg));
      };

      const playSimStep = (sim, stepIndex) => {
        const step = sim.steps[stepIndex];
        const allSpec = window.AGENTS.filter(a => a.role === "specialist").map(a => a.id);
        const others = allSpec.filter(id => id !== step.agentId).slice(0, 2);
        const cands = [...others, step.agentId];
        const CHAR_MS = 55;
        setSimRunning(true);
        setMessages(m => m.map(msg => msg.followUps ? { ...msg, followUps: null } : msg));
        const fullText = window.WL_LANG === "ko" ? step.userKo : step.userEn;
        const msgId = "u" + Date.now();
        setMessages(m => [...m, { id: msgId, role: "user", text: "", typing: true }]);
        let charIdx = 0;
        const iv = setInterval(() => {
          charIdx++;
          const done = charIdx >= fullText.length;
          setMessages(m => m.map(msg => msg.id === msgId ? { ...msg, text: fullText.slice(0, charIdx), typing: !done } : msg));
          if (done) {
            clearInterval(iv);
            setSending(true);
            setRouting({ candidates: cands, finalAgent: step.agentId });
            const t = setTimeout(() => {
              setRouting(null);
              const html = window.WL_LANG === "ko" ? step.botHtmlKo : step.botHtmlEn;
              const ac = step.actionCard ? { ...step.actionCard, title: window.WL_LANG === "ko" ? step.actionCard.title : step.actionCard.titleEn } : null;
              const remaining = sim.steps.slice(stepIndex + 1);
              const followUps = remaining.length > 0 ? remaining.map((s, idx) => ({ stepIndex: stepIndex + 1 + idx, textKo: s.userKo, textEn: s.userEn })) : null;
              setMessages(m => [...m, { id: "b" + Date.now(), role: "bot", html, agentId: step.agentId, routedTo: step.agentId, elapsed: step.elapsed, scenario: null, actionCard: ac, followUps }]);
              setLastTrace({ query: window.WL_LANG === "ko" ? step.userKo : step.userEn, candidates: cands, finalAgent: step.agentId, confidence: 0.96, elapsed: step.elapsed, minutesSaved: step.minutesSaved, tools: step.tools });
              setSending(false);
              setSimStep(stepIndex + 1);
              if (remaining.length > 0) {
                const autoT = setTimeout(() => playSimStep(sim, stepIndex + 1), sim.steps[stepIndex + 1].delayMs);
                simTimeoutsRef.current.push(autoT);
              } else {
                setSimRunning(false);
              }
            }, 600);
            simTimeoutsRef.current.push(t);
          }
        }, CHAR_MS);
        simTimeoutsRef.current.push(iv);
      };

      const runSimulation = (sim) => {
        stopSimulation();
        setMessages([{ id: "g0", role: "bot", html: window.t("chat_greeting") }]);
        setTab("chat");
        setInspectorOpen(false);
        setSimId(sim.id);
        setSimStep(0);
        setTimeout(() => playSimStep(sim, 0), 300);
      };

      const examples = personaPrompts[tweaks.persona] || personaPrompts.vet;
      const stats = useM(() => ({ saved: window.SEED_TASKS.reduce((s, t) => s + (t.status === "done" ? t.minutes : 0), 0), requests: window.SEED_TASKS.length, agents: window.AGENTS.filter(a => a.role === "specialist").length }), []);

      return <div className="app">
        <header className="app-header">
          <div className="brand">
            <div className="brand-mark"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="7" fill="#0d9488" /><path d="M8 14 L12 18 L20 10" stroke="#fff" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" /></svg></div>
            <div><div className="brand-name">{window.t("brand_name")}</div><div className="brand-sub">{window.t("header_subtitle")}</div></div>
          </div>
          <div className="header-stats">
            <div className="hstat"><b>{stats.saved}</b><span>{window.t("minutes_saved_today")}</span></div>
            <div className="hstat"><b>{stats.requests}</b><span>{window.t("requests_today")}</span></div>
            <div className="hstat"><b>{stats.agents}</b><span>{window.t("active_agents")}</span></div>
          </div>
          <div className="header-actions">
            <button className={"btn-ghost" + (demoOpen ? " active" : "")} onClick={() => setDemoOpen(!demoOpen)}>🎬 {window.t("demo_panel")}</button>
            <button className={"btn-ghost" + (inspectorOpen ? " active" : "")} onClick={() => setInspectorOpen(!inspectorOpen)}>◆ {window.t("nav_inspector")}</button>
            <button className="lang-toggle" onClick={() => window.WL_setLang(lang === "ko" ? "en" : "ko")}>
              <span className={lang === "ko" ? "active" : ""}>한</span><span className="divider">|</span><span className={lang === "en" ? "active" : ""}>EN</span>
            </button>
          </div>
        </header>

        <div className="app-body">
          <nav className="rail">
            <div className="rail-section">
              <div className="rail-label">{window.t("persona_label")}</div>
              <div className="persona-pills">
                {[{ id: "new", label: window.t("persona_new") }, { id: "vet", label: window.t("persona_vet") }, { id: "mgr", label: window.t("persona_mgr") }].map(p => <button key={p.id} className={"persona-pill" + (tweaks.persona === p.id ? " active" : "")} onClick={() => setTweak("persona", p.id)}>{p.label}</button>)}
              </div>
            </div>
            <div className="rail-section">
              {[["chat", "💬", "nav_chat"], ["community", "👥", "nav_community"], ["wiki", "📚", "nav_wiki"], ["tasks", "✓", "nav_tasks"]].map(([id, g, k]) => <button key={id} className={"rail-tab" + (tab === id ? " active" : "")} onClick={() => setTab(id)}><span className="rail-glyph">{g}</span><span>{window.t(k)}</span></button>)}
            </div>
            <div className="rail-section rail-bottom">
              <div className="rail-label">{lang === "ko" ? "전문 에이전트" : "Specialists"}</div>
              <div className="rail-agents">{window.AGENTS.filter(a => a.role === "specialist").slice(0, 8).map(a => <div key={a.id} className="rail-agent" title={window.agentName(a)}><AgentAvatar agent={a} style={tweaks.avatarStyle} size={22} /><span>{window.agentName(a).replace(/ Agent| 에이전트/g, "")}</span></div>)}</div>
            </div>
          </nav>

          <main className="workspace">
            {tab === "chat" && <div className="chat-panel">
              <div className="chat-scroll" ref={scrollRef}>
                <div className="chat-inner">
                  {messages.map(m => <ChatMessage key={m.id} msg={m} avatarStyle={tweaks.avatarStyle} onShowInspector={m.role !== "user" ? () => setInspectorOpen(true) : undefined} onFollowUp={m.followUps && !sending ? (si) => { simTimeoutsRef.current.forEach(clearTimeout); simTimeoutsRef.current = []; const s = (window.DEMO_SIMULATIONS || []).find(x => x.id === simId); if (s) playSimStep(s, si); } : null} />)}
                  {routing && <RoutingPulse candidates={routing.candidates} finalAgent={routing.finalAgent} avatarStyle={tweaks.avatarStyle} />}
                  {messages.length <= 1 && <div className="examples"><div className="examples-title">{window.t("examples_title")}</div><div className="examples-grid">{examples.map((q, i) => <button key={i} className="example-chip" onClick={() => send(q)}>{q}</button>)}</div></div>}
                </div>
              </div>
              <div className="chat-input-bar">
                <div className="chat-input-wrap">
                  <input className="chat-input" placeholder={window.t("chat_placeholder")} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") send(); }} />
                  <button className="btn-primary send-btn" onClick={() => send()} disabled={sending}>{window.t("send")} ↵</button>
                </div>
              </div>
            </div>}
            {tab === "community" && <CommunityBoard avatarStyle={tweaks.avatarStyle} />}
            {tab === "wiki" && <WikiPanel />}
            {tab === "tasks" && <TasksPanel avatarStyle={tweaks.avatarStyle} />}
          </main>

          <OrchestratorInspector open={inspectorOpen} onClose={() => setInspectorOpen(false)} lastTrace={lastTrace} avatarStyle={tweaks.avatarStyle} />
          <DemoPanel open={demoOpen} onClose={() => setDemoOpen(false)} onPlay={runSimulation} onStop={stopSimulation} simId={simId} simRunning={simRunning} simStep={simStep} lang={lang} />
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
